<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>LogiTrack</title>
</head>

<body class="d-flex flex-column min-vh-100">
    <header>

        <nav class="navbar py-4 text-bg-dark ">
            <div class="container-fluid ">
                <a class="navbar-brand text-light" href="#">
                    <img src="/docs/5.3/assets/brand/bootstrap-logo.svg" alt="Logo" width="30" height="24"
                        class="d-inline-block align-text-top "> LogiTrack </a>

                <a class="btn btn-primary fs-6" href="#reportarProblema" role="button"> Cerrar sesión</a>
            </div>
        </nav>
    </header>
    <main class="d-flex flex-grow-1 h-100">
        <div class="container mt-5">
            <div class="row justify-content-center g-4">

                <!-- Crear Envío -->
                <div class="col-12 col-md-5 col-lg-4 col-xl-3">
                    <div class="card border-1 rounded-4 p-4 text-center h-100" style="cursor: pointer;">
                        <div class="card-body d-flex flex-column align-items-center justify-content-center">
                            <div class="bg-secondary-subtle rounded-3 p-3 mb-3">
                                <i class="bi bi-plus-lg fs-3"></i>
                            </div>
                            <h5 class="card-title fw-bold">Crear Envío</h5>
                            <p class="card-text text-muted">Registra un nuevo paquete con toda la información necesaria
                            </p>
                        </div>
                    </div>
                </div>

                <!-- Buscar -->
                <div class="col-12 col-md-5 col-lg-4 col-xl-3">
                    <div class="card border-2 rounded-4 p-4 text-center h-100" style="cursor: pointer;">
                        <div class="card-body d-flex flex-column align-items-center justify-content-center">
                            <div class="bg-secondary-subtle rounded-3 p-3 mb-3">
                                <i class="bi bi-search fs-3"></i>
                            </div>
                            <h5 class="card-title fw-bold">Buscar</h5>
                            <p class="card-text text-muted">Busca envíos por tracking, destinatario o dirección</p>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>
    <footer class="border-top mt-auto bg-dark">
        <p class="text-center my-4 text-light">© 2026 Sistema Federal de Gestión de Logística y Distribución. Todos los
            derechos reservados</p>
    </footer>
</body>

</html>
