name: CI - LogiTrack
 
on:
  push:
    branches: [ machine-learning ]
  pull_request:
    branches: [ main, develop ]
 
jobs:
  build-and-test:
    runs-on: ubuntu-latest
 
    steps:
 
      # 1
      - name: Checkout del repositorio
        uses: actions/checkout@v4
 
      # 2
      - name: Instalar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.0"
 
      # 3
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
 
      # 4
      - name: Linter con flake8
        run: |
          flake8 src/backend/ --max-line-length=120 --extend-ignore=E261,E302,E305,F541,W292,W293
 
      # 5
      - name: Generar dataset de entrenamiento
        working-directory: src/backend/ml
        run: |
          python generar_dataset.py
 
      # 6
      - name: Entrenar modelo
        working-directory: src/backend/ml
        run: |
          python entrenar_modelo.py
 
      #7
      - name: Levantar API
        run: |
          uvicorn src.backend.main:app --host 127.0.0.1 --port 8000 & 
          sleep 5

      # 8
      - name: Ejecutar tests unitarios
        run: |
          pytest -v
